name: Build BKOS Brug

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: write

jobs:
  android:
    name: Android APK
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.3'
          channel: stable
          cache: true
      - name: Scaffolden + broncode kopiëren
        run: |
          flutter create --org nl.bkos --project-name bkos_brug --platforms android temp
          rm -rf temp/lib && cp -r bkos_brug/lib temp/lib
          cp bkos_brug/pubspec.yaml temp/pubspec.yaml
          cp bkos_brug/android/app/src/main/AndroidManifest.xml temp/android/app/src/main/AndroidManifest.xml
      - name: Dependencies installeren
        run: flutter pub get
        working-directory: temp
      - name: Gradle patch flutter_blue_plus_android
        run: |
          F=$(find ~/.pub-cache -path "*/flutter_blue_plus_android*/android/build.gradle" ! -path "*/example/*" | head -1)
          [ -n "$F" ] && sed -i 's/flutter\.compileSdkVersion/34/g' "$F"
      - name: Bouwen APK
        run: flutter build apk --debug
        working-directory: temp
      - run: cp temp/build/app/outputs/flutter-apk/app-debug.apk bkos-brug-android.apk
      - uses: actions/upload-artifact@v4
        with:
          name: bkos-brug-android
          path: bkos-brug-android.apk
          retention-days: 30

  web:
    name: Web Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.3'
          channel: stable
          cache: true
      - name: Scaffolden + broncode kopiëren
        run: |
          flutter create --org nl.bkos --project-name bkos_brug --platforms web temp
          rm -rf temp/lib && cp -r bkos_brug/lib temp/lib
          cp bkos_brug/pubspec.yaml temp/pubspec.yaml
          cp bkos_brug/web/index.html temp/web/index.html
          cp bkos_brug/web/manifest.json temp/web/manifest.json
      - name: Dependencies installeren
        run: flutter pub get
        working-directory: temp
      - name: Web bouwen
        run: flutter build web --release --base-href /BKOS-Brug/
        working-directory: temp
      - uses: actions/upload-artifact@v4
        with:
          name: bkos-brug-web
          path: temp/build/web/
          retention-days: 30
      - name: Deployen naar GitHub Pages
        if: github.ref == 'refs/heads/main'
        run: |
          cd temp/build/web
          git init
          git config user.email "actions@github.com"
          git config user.name "GitHub Actions"
          git add -A
          git commit -m "Deploy web build"
          git push --force "https://x-access-token:${{ github.token }}@github.com/brennyc86/BKOS-Brug.git" HEAD:gh-pages

  windows:
    name: Windows EXE
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.3'
          channel: stable
          cache: true
      - name: Scaffolden + broncode kopiëren
        shell: pwsh
        run: |
          flutter create --org nl.bkos --project-name bkos_brug --platforms windows temp
          Remove-Item -Recurse -Force temp/lib
          Copy-Item -Recurse bkos_brug/lib temp/lib
          Copy-Item bkos_brug/pubspec.yaml temp/pubspec.yaml
      - name: Dependencies installeren
        run: flutter pub get
        working-directory: temp
      - name: Windows bouwen
        run: flutter build windows --release
        working-directory: temp
      - name: Zippen
        shell: pwsh
        run: Compress-Archive -Path temp/build/windows/x64/runner/Release/* -DestinationPath bkos-brug-windows.zip
      - uses: actions/upload-artifact@v4
        with:
          name: bkos-brug-windows
          path: bkos-brug-windows.zip
          retention-days: 30

  ios:
    name: iOS Build
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.3'
          channel: stable
          cache: true
      - name: Scaffolden + broncode kopiëren
        run: |
          flutter create --org nl.bkos --project-name bkos_brug --platforms ios temp
          rm -rf temp/lib && cp -r bkos_brug/lib temp/lib
          cp bkos_brug/pubspec.yaml temp/pubspec.yaml
          cp bkos_brug/ios/Runner/Info.plist temp/ios/Runner/Info.plist
          # bonsoir_darwin vereist iOS 14.0+ voor Bonjour/mDNS
          sed -i '' "s/# platform :ios, '12.0'/platform :ios, '14.0'/" temp/ios/Podfile || true
          sed -i '' "s/platform :ios, '[0-9.]*/platform :ios, '14.0'/" temp/ios/Podfile || true
      - name: Dependencies installeren
        run: flutter pub get
        working-directory: temp
      - name: iOS bouwen (zonder signing)
        run: flutter build ios --no-codesign --release
        working-directory: temp
      - uses: actions/upload-artifact@v4
        with:
          name: bkos-brug-ios
          path: temp/build/ios/iphoneos/Runner.app
          retention-days: 30

  release:
    name: GitHub Release
    runs-on: ubuntu-latest
    needs: [android, windows]
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: bkos-brug-android
          path: release-files/
      - uses: actions/download-artifact@v4
        with:
          name: bkos-brug-windows
          path: release-files/
      - name: Release aanmaken
        run: |
          gh release delete "latest-build" --yes 2>/dev/null || true
          git push origin --delete "refs/tags/latest-build" 2>/dev/null || true
          gh release create "latest-build" \
            --title "Laatste build" \
            --notes "Build ${GITHUB_SHA::7}. Windows: bkos-brug-windows.zip uitpakken en bkos_brug.exe starten. Android: bkos-brug-android.apk installeren. iPhone: https://brennyc86.github.io/BKOS-Brug/ openen in Safari." \
            --prerelease \
            "release-files/bkos-brug-android.apk" \
            "release-files/bkos-brug-windows.zip"
        env:
          GH_TOKEN: ${{ github.token }}
